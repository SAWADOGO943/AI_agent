<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI-agent</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <h1><i class="fas fa-robot"></i> Agent d'Analyse de texte</h1>

      <div class="section">
        <h2><i class="fas fa-comments"></i> Chat</h2>
        <textarea
          id="chat-input"
          placeholder="Tapez votre message..."
          rows="3"
        ></textarea>
        <button id="chat-btn">
          <i class="fas fa-paper-plane"></i> Envoyer
        </button>
        <div id="chat-response" class="response"></div>
      </div>

      <div class="section">
        <h2><i class="fas fa-brain"></i> Analyse par Agent</h2>
        <textarea
          id="agent-input"
          placeholder="Tapez le texte à analyser..."
          rows="4"
        ></textarea>
        <input
          type="text"
          id="agent-task"
          placeholder="Tâche (optionnel)"
          value="Analyse complète de ce texte"
        />
        <button id="agent-btn"><i class="fas fa-search"></i> Analyser</button>
        <div id="agent-response" class="response"></div>
      </div>

      <div class="section">
        <h2><i class="fas fa-info-circle"></i> Status</h2>
        <button id="status-btn">
          <i class="fas fa-check-circle"></i> Vérifier Status
        </button>
        <div id="status-response" class="response"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
